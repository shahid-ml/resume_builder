<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #4CAF50, #2ecc71);">

<div class="auth-container" style="width: 1100px; min-height: 650px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.18); display: flex;">
    <div class="auth-left" style="padding: 90px 60px; width: 50%; display: flex; flex-direction: column; justify-content: center;">
        <h1 style="font-size: 3.2rem; margin-bottom: 24px; font-weight: 700;">Create Account 🚀</h1>
        <p style="font-size: 1.5rem; color: #e0f2f1; font-weight: 500;">Start building your resume in minutes.</p>
    </div>

    <div class="auth-right" style="padding: 90px 60px; width: 50%; display: flex; flex-direction: column; justify-content: center;">
        <form method="POST" class="auth-form" style="max-width: 480px; margin: 0 auto;">
            <h2 style="font-size: 2.5rem; margin-bottom: 36px; font-weight: 600; text-align: center;">Register</h2>

            <input type="text" name="name" placeholder="Full Name" required style="font-size: 1.35rem; padding: 24px; margin-bottom: 28px; border-radius: 12px; border: 1.5px solid #bdbdbd;">
            <input type="email" name="email" placeholder="Email" required style="font-size: 1.35rem; padding: 24px; margin-bottom: 28px; border-radius: 12px; border: 1.5px solid #bdbdbd;">
            <input type="password" name="password" placeholder="Password" required style="font-size: 1.35rem; padding: 24px; margin-bottom: 36px; border-radius: 12px; border: 1.5px solid #bdbdbd;">

            <button type="submit" style="font-size: 1.35rem; padding: 20px; margin-bottom: 28px; border-radius: 12px; background: #4CAF50; color: white; border: none; width: 100%; font-weight: 600; letter-spacing: 1px;">Register</button>

            <p style="font-size: 1.25rem; text-align: center;">Already have an account? <a href="/login" style="color: #4CAF50; font-weight: 600;">Login</a></p>
        </form>
    </div>
</div>

</body>
</html>
